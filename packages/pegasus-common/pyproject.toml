[build-system]

requires = ["setuptools>61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]

zip-safe = false

[tool.setuptools.packages.find]

where = ["src"]
namespaces = true

[project]

name = "pegasus-wms.common"
version = "6.0.0-dev.0"
authors = [{ name = "Pegasus Team", email = "pegasus@isi.edu" }]
maintainers = [{ name = "Rajiv Mayani", email = "mayani@isi.edu" }]
description = "Pegasus Workflow Management System Python API"
readme = { file = "README.md", content-type = "text/markdown" }
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10"
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Operating System :: Unix",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Scientific/Engineering",
  "Topic :: Utilities",
]
dependencies = ["PyYAML"]
keywords = ["scientific workflows"]

[project.urls]

Homepage = "https://pegasus.isi.edu"
Documentation = "https://pegasus.isi.edu/documentation/"
Changes = "https://pegasus.isi.edu/blog/?category_name=Release"
Repository = "https://github.com/pegasus-isi/pegasus"
Issues = "https://github.com/pegasus-isi/pegasus/issues"


[dependency-groups]

dev = ["ruff", "tox"]


[tool.ruff]

target-version = "py310"
line-length = 88

[tool.ruff.lint]

extend-select = [
    "F",   # pyflakes
    # "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    # "D",   # flake8-docstrings
    # "B",   # flake8-bugbear
    # "C90", # mccabe
    "C4",  # flake8-comprehensions
    "YTT", # flake8-2020
    # "ANN", # flake8-annotations
    # "S",   # flake8-bandit
    "EXE", # flake8-executable
    "FA",  # flake8-future-annotations
    "ICN", # flake8-import-conventions
    "ISC", # flake8-implicit-str-concat
    "LOG", # flake8-logging
    # "G",   # flake8-logging-format
    # "PT",  # flake8-pytest-style
    "Q",   # flake8-quotes
    "RSE", # flake8-raise
    "RET", # flake8-return
    # "SIM", # flake8-simplify
    "TID", # flake8-tidy-imports
    "TC",  # flake8-type-checking
    # "ARG", # flake8-unused-arguments
    # "PTH", # flake8-use-pathlib
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = ["F403", "F405"]

[tool.ruff.lint.per-file-ignores]

"test/**" = ["S101", "D101", "D103", "D104"]

[tool.ruff.lint.pydocstyle]

convention = "google"

[tool.ruff.format]

docstring-code-format = true

[tool.ruff.lint.isort]

known-first-party = ["Pegasus"]
known-third-party = ["yaml"]
forced-separate = ["Pegasus"]


[tool.pytest.ini_options]

pythonpath = ["src"]
testpaths = ["test"]


[tool.coverage.run]

source = ["src"]
